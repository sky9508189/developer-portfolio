<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="app-header">
      <div class="header-left">
        <span class="logo">✦ Portfolio Builder</span>
      </div>
      <div class="header-center">
        <button class="tab-btn active" data-tab="editor">Editor</button>
        <button class="tab-btn" data-tab="preview">Preview</button>
      </div>
      <div class="header-right">
        <button id="exportBtn" class="btn btn-gold">Export Code</button>
        <button id="resetBtn" class="btn btn-outline">Reset</button>
      </div>
    </header>

    <div id="main-content">
      <!-- ========== EDITOR PANEL ========== -->
      <div id="editor-panel" class="panel active">
        <div class="editor-inner">
          <div class="editor-scroll">

            <!-- Theme -->
            <section class="form-section">
              <h3>Theme</h3>
              <div class="theme-grid" id="themeGrid">
                <div class="theme-card active" data-theme="classic">
                  <div class="theme-preview theme-preview-classic"></div>
                  <span>Classic</span>
                </div>
                <div class="theme-card" data-theme="dark">
                  <div class="theme-preview theme-preview-dark"></div>
                  <span>Dark</span>
                </div>
                <div class="theme-card" data-theme="gradient">
                  <div class="theme-preview theme-preview-gradient"></div>
                  <span>Gradient</span>
                </div>
                <div class="theme-card" data-theme="minimal">
                  <div class="theme-preview theme-preview-minimal"></div>
                  <span>Minimal</span>
                </div>
              </div>
            </section>

            <!-- Personal -->
            <section class="form-section">
              <h3>Personal Info</h3>
              <div class="form-grid">
                <div class="field">
                  <label>Full Name</label>
                  <input type="text" id="field-name" value="Alex Johnson" placeholder="Jane Doe">
                </div>
                <div class="field">
                  <label>Job Title</label>
                  <input type="text" id="field-title" value="Full-Stack Developer" placeholder="Software Engineer">
                </div>
                <div class="field">
                  <label>Email</label>
                  <input type="email" id="field-email" value="alex@example.com" placeholder="hello@example.com">
                </div>
                <div class="field">
                  <label>Location</label>
                  <input type="text" id="field-location" value="San Francisco, CA" placeholder="New York, USA">
                </div>
                <div class="field">
                  <label>GitHub URL</label>
                  <input type="url" id="field-github" value="https://github.com/alexj" placeholder="https://github.com/username">
                </div>
                <div class="field">
                  <label>LinkedIn URL</label>
                  <input type="url" id="field-linkedin" value="https://linkedin.com/in/alexj" placeholder="https://linkedin.com/in/username">
                </div>
              </div>
              <div class="field">
                <label>Profile Photo URL</label>
                <input type="url" id="field-photo" placeholder="https://example.com/photo.jpg">
              </div>
              <div class="field">
                <label>Bio</label>
                <textarea id="field-bio" rows="3" placeholder="Write a short bio...">Passionate full-stack developer with 5+ years building modern web applications. Love open source and clean code.</textarea>
              </div>
            </section>

            <!-- Skills -->
            <section class="form-section">
              <h3>Skills</h3>
              <div class="tag-input">
                <div class="tag-list" id="skillList">
                  <div class="tag" data-value="JavaScript">JavaScript <span class="tag-remove">&times;</span></div>
                  <div class="tag" data-value="React">React <span class="tag-remove">&times;</span></div>
                  <div class="tag" data-value="Node.js">Node.js <span class="tag-remove">&times;</span></div>
                  <div class="tag" data-value="Python">Python <span class="tag-remove">&times;</span></div>
                  <div class="tag" data-value="TypeScript">TypeScript <span class="tag-remove">&times;</span></div>
                </div>
                <div class="tag-input-row">
                  <input type="text" id="skillInput" placeholder="Add a skill..." class="tag-field">
                  <button id="addSkillBtn" class="btn btn-sm">Add</button>
                </div>
              </div>
            </section>

            <!-- Projects -->
            <section class="form-section">
              <h3>Projects</h3>
              <div id="projectsList"></div>
              <button id="addProjectBtn" class="btn btn-sm btn-outline">+ Add Project</button>
            </section>

            <!-- Experience -->
            <section class="form-section">
              <h3>Experience</h3>
              <div id="experienceList"></div>
              <button id="addExperienceBtn" class="btn btn-sm btn-outline">+ Add Experience</button>
            </section>

            <!-- Education -->
            <section class="form-section">
              <h3>Education</h3>
              <div id="educationList"></div>
              <button id="addEducationBtn" class="btn btn-sm btn-outline">+ Add Education</button>
            </section>

          </div>
        </div>
      </div>

      <!-- ========== PREVIEW PANEL ========== -->
      <div id="preview-panel" class="panel">
        <div class="preview-toolbar">
          <span class="preview-label">Live Preview</span>
          <div class="preview-actions">
            <button id="refreshPreviewBtn" class="btn btn-sm" title="Refresh">↻</button>
            <a id="openNewTab" href="#" target="_blank" class="btn btn-sm" title="Open in new tab">↗</a>
          </div>
        </div>
        <div class="preview-container">
          <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin"></iframe>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
