<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>portfolio.build</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <span class="logo">portfolio.build</span>
        <span class="logo-cursor">_</span>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item active" data-section="editor"><span class="nav-icon">></span> editor</a>
        <a class="nav-item" data-section="preview"><span class="nav-icon">></span> preview</a>
      </nav>
      <div class="sidebar-footer">
        <button id="exportBtn" class="cmd-btn">$ export --html</button>
        <button id="resetBtn" class="cmd-btn cmd-muted">$ reset</button>
      </div>
    </aside>

    <main id="main">
      <div id="editor-section" class="section active">
        <div class="editor-scroll" id="editorScroll">

          <div class="editor-card" style="--d:0">
            <div class="card-label">// theme config</div>
            <div class="theme-rows" id="themeGrid">
              <div class="theme-opt active" data-theme="developer"><span class="t-preview t-dev"></span> developer</div>
              <div class="theme-opt" data-theme="dark"><span class="t-preview t-dark"></span> dark</div>
              <div class="theme-opt" data-theme="gradient"><span class="t-preview t-grad"></span> gradient</div>
              <div class="theme-opt" data-theme="minimal"><span class="t-preview t-min"></span> minimal</div>
              <div class="theme-opt" data-theme="classic"><span class="t-preview t-cls"></span> classic</div>
            </div>
          </div>

          <div class="editor-card" style="--d:1">
            <div class="card-label">// personal</div>
            <div class="field-row">
              <div class="field"><label>name</label><input id="f-name" value="Alex Johnson" class="inp"></div>
              <div class="field"><label>title</label><input id="f-title" value="Full-Stack Developer" class="inp"></div>
            </div>
            <div class="field-row">
              <div class="field"><label>email</label><input id="f-email" value="alex@dev.com" class="inp"></div>
              <div class="field"><label>location</label><input id="f-location" value="SF, CA" class="inp"></div>
            </div>
            <div class="field-row">
              <div class="field"><label>github</label><input id="f-github" value="https://github.com/alexj" class="inp"></div>
              <div class="field"><label>linkedin</label><input id="f-linkedin" value="https://linkedin.com/in/alexj" class="inp"></div>
            </div>
            <div class="field"><label>photo url</label><input id="f-photo" class="inp" placeholder="https://..."></div>
            <div class="field"><label>bio</label><textarea id="f-bio" rows="2" class="inp">Passionate full-stack developer building modern web apps with clean code.</textarea></div>
          </div>

          <div class="editor-card" style="--d:2">
            <div class="card-label">// skills</div>
            <div class="tag-bank" id="skillList"></div>
            <div class="tag-add-row">
              <input id="skillInput" class="inp" placeholder="$ add skill">
              <button id="addSkillBtn" class="mini-btn">+</button>
            </div>
          </div>

          <div class="editor-card" style="--d:3">
            <div class="card-label">// projects <button id="addProjectBtn" class="mini-btn mini-add">+ add</button></div>
            <div id="projectsList"></div>
          </div>

          <div class="editor-card" style="--d:4">
            <div class="card-label">// experience <button id="addExperienceBtn" class="mini-btn mini-add">+ add</button></div>
            <div id="experienceList"></div>
          </div>

          <div class="editor-card" style="--d:5">
            <div class="card-label">// education <button id="addEducationBtn" class="mini-btn mini-add">+ add</button></div>
            <div id="educationList"></div>
          </div>

        </div>
      </div>

      <div id="preview-section" class="section">
        <div class="preview-wrap" id="previewWrap">
          <div class="preview-frame-wrap">
            <div class="frame-bar">
              <span class="frame-dot red"></span>
              <span class="frame-dot yellow"></span>
              <span class="frame-dot green"></span>
              <span class="frame-title">preview</span>
              <button id="refreshPreviewBtn" class="mini-btn">↻</button>
            </div>
            <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin"></iframe>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast"></div>
  <div id="cursorGlow"></div>
  <script src="script.js"></script>
</body>
</html>
